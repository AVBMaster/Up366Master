name: Build All Platforms

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  MAUI_PROJECT: 'Up366Master/Up366Master.csproj'
  CLI_PROJECT: 'Up366MasterCLI/Up366MasterCLI.csproj'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  # ============================================
  # MAUI - Android
  # ============================================
  build-android:
    runs-on: windows-latest
    name: MAUI Android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet workload install maui --ignore-failed-sources
      - run: dotnet restore ${{ env.MAUI_PROJECT }}
      - run: dotnet publish ${{ env.MAUI_PROJECT }} -f net10.0-android -c Release
      - name: List Android Output
        shell: pwsh
        run: |
          Get-ChildItem -Path "Up366Master/bin/Release/net10.0-android" -Recurse -ErrorAction SilentlyContinue | Select-Object FullName
      - uses: actions/upload-artifact@v4
        with:
          name: maui-android
          path: Up366Master/bin/Release/net10.0-android/publish/*-Signed.*

  # ============================================
  # MAUI - iOS (使用临时自签名证书)
  # ============================================
  build-ios:
    runs-on: macos-latest
    name: MAUI iOS
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Create temporary iOS certificate
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          
          openssl req -x509 -newkey rsa:2048 -keyout $RUNNER_TEMP/key.pem -out $RUNNER_TEMP/cert.pem -days 1 -nodes -subj "/CN=TempiOSDeveloper"
          openssl pkcs12 -export -out $CERTIFICATE_PATH -inkey $RUNNER_TEMP/key.pem -in $RUNNER_TEMP/cert.pem -password pass:temp123
          
          security create-keychain -p "temp123" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "temp123" $KEYCHAIN_PATH
          
          security import $CERTIFICATE_PATH -P "temp123" -A -t cert -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "temp123" $KEYCHAIN_PATH

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet workload install maui --ignore-failed-sources
      - run: dotnet restore ${{ env.MAUI_PROJECT }}
      - run: |
          dotnet publish ${{ env.MAUI_PROJECT }} \
            -f net10.0-ios \
            -c Release \
            -p:RuntimeIdentifier=ios-arm64 \
            -p:CodesignKey="TempiOSDeveloper" \
            -p:BuildIpa=true
      - name: List iOS Output
        run: find Up366Master/bin/Release/net10.0-ios -type f 2>/dev/null || echo "Directory not found"
      - uses: actions/upload-artifact@v4
        with:
          name: maui-ios
          path: Up366Master/bin/Release/net10.0-ios/publish/*.ipa

  # ============================================
  # MAUI - macOS (Mac Catalyst)
  # ============================================
  build-maui-macos:
    runs-on: macos-latest
    name: MAUI macOS
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet workload install maui --ignore-failed-sources
      - run: dotnet restore ${{ env.MAUI_PROJECT }}
      - run: dotnet publish ${{ env.MAUI_PROJECT }} -f net10.0-maccatalyst -c Release
      - name: List macOS Output
        run: find Up366Master/bin/Release/net10.0-maccatalyst -type f 2>/dev/null | head -50 || echo "Directory not found"
      - uses: actions/upload-artifact@v4
        with:
          name: maui-macos
          path: Up366Master/bin/Release/net10.0-maccatalyst/publish/*.pkg

  # ============================================
  # MAUI - Windows (单文件)
  # ============================================
  build-maui-windows:
    runs-on: windows-latest
    name: MAUI Windows
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet workload install maui --ignore-failed-sources
      - run: dotnet restore ${{ env.MAUI_PROJECT }}
      - run: |
          dotnet publish ${{ env.MAUI_PROJECT }} `
            -f net10.0-windows10.0.19041.0 `
            -c Release `
            -p:WindowsPackageType=None `
            -p:PublishSingleFile=true `
            -p:SelfContained=true `
            -p:RuntimeIdentifier=win-x64 `
            -p:IncludeNativeLibrariesForSelfExtract=true
      - name: List Windows Output
        shell: pwsh
        run: |
          Get-ChildItem -Path "Up366Master/bin/Release/net10.0-windows10.0.19041.0" -Recurse -ErrorAction SilentlyContinue | Select-Object FullName
      - uses: actions/upload-artifact@v4
        with:
          name: maui-windows
          path: Up366Master/bin/Release/net10.0-windows10.0.19041.0/win-x64/publish/*.exe

  # ============================================
  # CLI - Windows (x64) 单文件
  # ============================================
  build-cli-windows:
    runs-on: windows-latest
    name: CLI Windows x64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet restore ${{ env.CLI_PROJECT }}
      - run: |
          dotnet publish ${{ env.CLI_PROJECT }} `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true
      - uses: actions/upload-artifact@v4
        with:
          name: cli-windows-x64
          path: Up366MasterCLI/bin/Release/net10.0/win-x64/publish/*.exe

  # ============================================
  # CLI - Linux (x64) 单文件
  # ============================================
  build-cli-linux:
    runs-on: ubuntu-latest
    name: CLI Linux x64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet restore ${{ env.CLI_PROJECT }}
      - run: |
          dotnet publish ${{ env.CLI_PROJECT }} \
            -c Release \
            -r linux-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true
      - uses: actions/upload-artifact@v4
        with:
          name: cli-linux-x64
          path: Up366MasterCLI/bin/Release/net10.0/linux-x64/publish/Up366MasterCLI

  # ============================================
  # CLI - macOS (x64 + arm64) 单文件
  # ============================================
  build-cli-macos:
    runs-on: macos-latest
    name: CLI macOS
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet restore ${{ env.CLI_PROJECT }}
      - run: |
          dotnet publish ${{ env.CLI_PROJECT }} \
            -c Release \
            -r osx-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true
      - run: |
          dotnet publish ${{ env.CLI_PROJECT }} \
            -c Release \
            -r osx-arm64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true
      - uses: actions/upload-artifact@v4
        with:
          name: cli-macos
          path: |
            Up366MasterCLI/bin/Release/net10.0/osx-x64/publish/Up366MasterCLI
            Up366MasterCLI/bin/Release/net10.0/osx-arm64/publish/Up366MasterCLI

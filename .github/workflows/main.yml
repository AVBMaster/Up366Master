name: Build All Platforms

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:  # 手动触发按钮

env:
  DOTNET_VERSION: '10.0.x'
  MAUI_PROJECT: 'Up366Master/Up366Master.csproj'
  CLI_PROJECT: 'Up366MasterCLI/Up366MasterCLI.csproj'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  # ============================================
  # MAUI - Android
  # ============================================
  build-android:
    runs-on: windows-latest
    name: MAUI Android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet workload install maui --ignore-failed-sources
      - run: dotnet restore ${{ env.MAUI_PROJECT }}
      - run: dotnet publish ${{ env.MAUI_PROJECT }} -f net10.0-android -c Release
      - uses: actions/upload-artifact@v4
        with:
          name: maui-android
          path: |
            **/bin/Release/net10.0-android/publish/*-Signed.aab
            **/bin/Release/net10.0-android/publish/*-Signed.apk

  # ============================================
  # MAUI - iOS
  # ============================================
  build-ios:
    runs-on: macos-latest
    name: MAUI iOS
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet workload install maui --ignore-failed-sources
      - run: dotnet restore ${{ env.MAUI_PROJECT }}
      - run: dotnet publish ${{ env.MAUI_PROJECT }} -f net10.0-ios -c Release -p:RuntimeIdentifier=ios-arm64
      - uses: actions/upload-artifact@v4
        with:
          name: maui-ios
          path: '**/bin/Release/net10.0-ios/publish/*.ipa'

  # ============================================
  # MAUI - macOS (Mac Catalyst)
  # ============================================
  build-maui-macos:
    runs-on: macos-latest
    name: MAUI macOS
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet workload install maui --ignore-failed-sources
      - run: dotnet restore ${{ env.MAUI_PROJECT }}
      - run: dotnet publish ${{ env.MAUI_PROJECT }} -f net10.0-maccatalyst -c Release
      - uses: actions/upload-artifact@v4
        with:
          name: maui-macos
          path: '**/bin/Release/net10.0-maccatalyst/publish/*.app'

  # ============================================
  # MAUI - Windows
  # ============================================
  build-maui-windows:
    runs-on: windows-latest
    name: MAUI Windows
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet workload install maui --ignore-failed-sources
      - run: dotnet restore ${{ env.MAUI_PROJECT }}
      - run: dotnet publish ${{ env.MAUI_PROJECT }} -f net10.0-windows10.0.19041.0 -c Release -p:WindowsPackageType=None
      - uses: actions/upload-artifact@v4
        with:
          name: maui-windows
          path: '**/bin/Release/net10.0-windows*/publish/*.exe'

  # ============================================
  # CLI - Windows (x64)
  # ============================================
  build-cli-windows:
    runs-on: windows-latest
    name: CLI Windows x64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet restore ${{ env.CLI_PROJECT }}
      - run: dotnet publish ${{ env.CLI_PROJECT }} -c Release -r win-x64 --self-contained true
      - uses: actions/upload-artifact@v4
        with:
          name: cli-windows-x64
          path: '**/bin/Release/net10.0/win-x64/publish/*'

  # ============================================
  # CLI - Linux (x64)
  # ============================================
  build-cli-linux:
    runs-on: ubuntu-latest
    name: CLI Linux x64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet restore ${{ env.CLI_PROJECT }}
      - run: dotnet publish ${{ env.CLI_PROJECT }} -c Release -r linux-x64 --self-contained true
      - uses: actions/upload-artifact@v4
        with:
          name: cli-linux-x64
          path: '**/bin/Release/net10.0/linux-x64/publish/*'

  # ============================================
  # CLI - macOS (x64 + arm64)
  # ============================================
  build-cli-macos:
    runs-on: macos-latest
    name: CLI macOS
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet restore ${{ env.CLI_PROJECT }}
      - run: dotnet publish ${{ env.CLI_PROJECT }} -c Release -r osx-x64 --self-contained true
      - run: dotnet publish ${{ env.CLI_PROJECT }} -c Release -r osx-arm64 --self-contained true
      - uses: actions/upload-artifact@v4
        with:
          name: cli-macos
          path: |
            **/bin/Release/net10.0/osx-x64/publish/*
            **/bin/Release/net10.0/osx-arm64/publish/*

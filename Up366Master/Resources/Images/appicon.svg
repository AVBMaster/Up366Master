<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- 主渐变 - 教育蓝到科技青 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E3A8A"/>
      <stop offset="50%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>

    <!-- 书本渐变 -->
    <linearGradient id="bookGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E0F2FE"/>
    </linearGradient>

    <!-- 皇冠/大师金 -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="50%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>

    <!-- 阴影 -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.25"/>
    </filter>

    <!-- 内发光 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- 背景圆角矩形 -->
  <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- 装饰圆环 -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
  <circle cx="256" cy="256" r="150" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>

  <!-- 书本主体 -->
  <g transform="translate(256, 260)">
    <!-- 书本底部阴影 -->
    <path d="M -90 60 Q 0 75 90 60 L 90 70 Q 0 85 -90 70 Z" fill="rgba(0,0,0,0.2)"/>

    <!-- 左页 -->
    <path d="M -85 -50 Q -40 -65 0 -55 L 0 65 Q -40 75 -85 60 Z" fill="url(#bookGrad)" stroke="#BFDBFE" stroke-width="2"/>
    <!-- 右页 -->
    <path d="M 85 -50 Q 40 -65 0 -55 L 0 65 Q 40 75 85 60 Z" fill="url(#bookGrad)" stroke="#BFDBFE" stroke-width="2"/>

    <!-- 书脊 -->
    <path d="M -5 -55 L 5 -55 L 5 65 L -5 65 Z" fill="#93C5FD"/>

    <!-- 左页文字行 -->
    <line x1="-70" y1="-30" x2="-20" y2="-30" stroke="#93C5FD" stroke-width="4" stroke-linecap="round"/>
    <line x1="-70" y1="-10" x2="-15" y2="-10" stroke="#93C5FD" stroke-width="4" stroke-linecap="round"/>
    <line x1="-70" y1="10" x2="-25" y2="10" stroke="#93C5FD" stroke-width="4" stroke-linecap="round"/>
    <line x1="-70" y1="30" x2="-20" y2="30" stroke="#93C5FD" stroke-width="4" stroke-linecap="round"/>

    <!-- 右页文字行 -->
    <line x1="20" y1="-30" x2="70" y2="-30" stroke="#93C5FD" stroke-width="4" stroke-linecap="round"/>
    <line x1="15" y1="-10" x2="70" y2="-10" stroke="#93C5FD" stroke-width="4" stroke-linecap="round"/>
    <line x1="25" y1="10" x2="70" y2="10" stroke="#93C5FD" stroke-width="4" stroke-linecap="round"/>
    <line x1="20" y1="30" x2="70" y2="30" stroke="#93C5FD" stroke-width="4" stroke-linecap="round"/>

    <!-- 皇冠/大师标志 -->
    <g transform="translate(0, -85)">
      <!-- 皇冠主体 -->
      <path d="M -35 15 L -25 -15 L -10 5 L 0 -20 L 10 5 L 25 -15 L 35 15 Q 0 25 -35 15 Z" fill="url(#goldGrad)" filter="url(#glow)"/>
      <!-- 皇冠宝石 -->
      <circle cx="0" cy="-8" r="5" fill="#EF4444"/>
      <circle cx="-18" cy="-2" r="3.5" fill="#3B82F6"/>
      <circle cx="18" cy="-2" r="3.5" fill="#3B82F6"/>
      <!-- 皇冠底部 -->
      <rect x="-32" y="12" width="64" height="6" rx="3" fill="#B45309"/>
    </g>

    <!-- 网络/连接线条 (天学网概念) -->
    <circle cx="-110" cy="-20" r="8" fill="rgba(255,255,255,0.3)"/>
    <circle cx="110" cy="-20" r="8" fill="rgba(255,255,255,0.3)"/>
    <circle cx="-110" cy="40" r="6" fill="rgba(255,255,255,0.2)"/>
    <circle cx="110" cy="40" r="6" fill="rgba(255,255,255,0.2)"/>
    <line x1="-90" y1="-15" x2="-102" y2="-20" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
    <line x1="90" y1="-15" x2="102" y2="-20" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
    <line x1="-85" y1="50" x2="-104" y2="40" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <line x1="85" y1="50" x2="104" y2="40" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  </g>

  <!-- 底部应用名称缩写 -->
  <text x="256" y="430" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="rgba(255,255,255,0.6)" letter-spacing="4">UP366</text>
</svg>